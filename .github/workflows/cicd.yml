name: ECR Push - store

on:
  push:
    branches:
      - feat/#10-cicd
#    branches: ["dev", "refactor/seperate-ci"]

concurrency:
  group: review-lambda-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ap-northeast-2
  ECR_REPO: report-python
  LAMBDA_FUNCTION_NAME: report-python-lambda
  LAMBDA_ALIAS: latest

jobs:
#  test:
#    name: Run Python tests
#    runs-on: ubuntu-latest
#    steps:
#      - uses: actions/checkout@v4
#      - uses: actions/setup-python@v5
#        with:
#          python-version: "3.9"
#      - name: Install deps
#        run: |
#          python -m pip install --upgrade pip
#          pip install pytest
#          pip install -r requirements.txt
#      - name: Pytest
#        run: pytest -q --maxfail=1 --disable-warnings

  build_and_push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
#    needs: test
#    if: ${{ needs.test.result == 'success' }}
    outputs:
      image_digest: ${{ steps.build.outputs.digest }}
      registry: ${{ steps.ecr.outputs.registry }}
      image_repo: ${{ env.ECR_REPO }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          # role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}

      # ECR 로그인
      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 태그/라벨 자동화 (latest + sha)
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO }}
          tags: |
            type=raw,value=latest
            type=sha,format=short
          labels: |
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.run_id }}

      # Buildx + 캐시
      - name: Set up Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true

      # 빌드 & 푸시 (digest 출력)
      - name: Build & Push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
